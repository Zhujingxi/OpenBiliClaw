<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenBiliClaw · 首次设置</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #181b22;
        --panel-2: #20242e;
        --line: #2c313c;
        --text: #eef1f6;
        --muted: #99a2b2;
        --accent: #fb7299;
        --ok: #36c46f;
        --warn: #f4b942;
        --err: #ff6b6b;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(
          1200px 600px at 50% -10%,
          #1b2030 0%,
          var(--bg) 60%
        );
        color: var(--text);
        font:
          15px/1.6 -apple-system,
          "PingFang SC",
          system-ui,
          sans-serif;
        display: grid;
        place-items: center;
        padding: 32px 16px;
      }
      .card {
        width: min(860px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 24px 60px #0007;
        overflow: hidden;
      }
      .head {
        padding: 26px 28px 18px;
        border-bottom: 1px solid var(--line);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 17px;
      }
      .mark {
        width: 30px;
        height: 30px;
        border-radius: 9px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--accent), #ff9bb6);
      }
      .steps {
        display: flex;
        gap: 8px;
        margin-top: 18px;
      }
      .dot {
        flex: 1;
        height: 4px;
        border-radius: 99px;
        background: var(--line);
      }
      .dot.active {
        background: var(--accent);
      }
      .dot.done {
        background: var(--ok);
      }
      .body {
        padding: 26px 28px;
      }
      .panel {
        display: none;
      }
      .panel.active {
        display: block;
      }
      h2 {
        margin: 0 0 6px;
      }
      .sub,
      .hint {
        color: var(--muted);
      }
      .hint {
        font-size: 12.5px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin: 18px 0;
      }
      .source {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel-2);
        display: flex;
        gap: 10px;
        align-items: flex-start;
      }
      .source input {
        margin-top: 5px;
        accent-color: var(--accent);
      }
      .source strong,
      .source small {
        display: block;
      }
      .source small {
        color: var(--muted);
      }
      .alias-list {
        display: grid;
        gap: 9px;
        margin: 16px 0;
      }
      .alias {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 14px;
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 12px;
      }
      .ok {
        color: var(--ok);
      }
      .bad {
        color: var(--err);
      }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-top: 24px;
      }
      button,
      .button {
        border: 0;
        border-radius: 11px;
        padding: 11px 18px;
        font: 700 14px inherit;
        cursor: pointer;
        text-decoration: none;
      }
      .primary {
        background: var(--accent);
        color: white;
      }
      .ghost {
        background: transparent;
        color: var(--muted);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .msg {
        display: none;
        margin-top: 14px;
        padding: 11px 13px;
        border-radius: 10px;
      }
      .msg.show {
        display: block;
      }
      .msg.info {
        color: var(--accent);
        background: #fb72991f;
      }
      .msg.err {
        color: var(--err);
        background: #ff6b6b1f;
      }
      .msg.ok {
        color: var(--ok);
        background: #36c46f1f;
      }
      .progress {
        height: 8px;
        border-radius: 99px;
        background: #10131a;
        overflow: hidden;
        margin: 18px 0;
      }
      .progress span {
        display: block;
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, var(--accent), #2bb3a3);
        transition: width 0.25s;
      }
      .login {
        display: flex;
        gap: 10px;
      }
      .login input {
        flex: 1;
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 11px 13px;
      }
      @media (max-width: 620px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .body,
        .head {
          padding: 22px 18px;
        }
        .row {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <header class="head">
        <div class="brand"><span class="mark">B</span>OpenBiliClaw</div>
        <div class="steps">
          <span class="dot active"></span><span class="dot"></span
          ><span class="dot"></span>
        </div>
      </header>
      <div class="body">
        <section class="panel active" data-step="0">
          <h2>连接 AI 服务</h2>
          <p class="sub">
            模型、凭据、路由和预算统一在 LiteLLM Admin 管理。这里确认
            OpenBiliClaw 的三个稳定别名可用。
          </p>
          <div id="loginBox" hidden>
            <p class="hint">后端启用了访问密码，请先登录。</p>
            <form id="loginForm" class="login">
              <input
                id="password"
                type="password"
                autocomplete="current-password"
                required
                placeholder="访问密码"
              /><button class="primary">登录</button>
            </form>
          </div>
          <div id="aliasList" class="alias-list" aria-live="polite">
            <div class="alias">
              <span>正在检查 /api/v1/system/ai-health…</span>
            </div>
          </div>
          <a
            id="adminLink"
            class="button ghost"
            target="_blank"
            rel="noreferrer"
            hidden
            >打开 LiteLLM Admin ↗</a
          >
          <div id="aiMessage" class="msg"></div>
          <div class="row">
            <span></span
            ><button id="nextAi" class="primary" disabled>
              继续选择内容源 →
            </button>
          </div>
        </section>
        <section class="panel" data-step="1">
          <h2>选择内容源</h2>
          <p class="sub">
            保留你真正使用的平台。浏览器扩展会承担需要浏览器登录态的采集任务。
          </p>
          <div id="sourceList" class="grid"></div>
          <div id="sourceMessage" class="msg"></div>
          <div class="row">
            <button class="ghost" data-back>← 上一步</button
            ><button id="start" class="primary">开始初始化 →</button>
          </div>
        </section>
        <section class="panel" data-step="2">
          <h2>正在建立你的推荐体验</h2>
          <p class="sub">
            依次同步来源、投影证据画像并补齐发现流。关闭页面不会中断后台任务。
          </p>
          <div class="progress"><span id="progressBar"></span></div>
          <p id="progressLabel" class="hint" role="status">等待开始</p>
          <div id="runMessage" class="msg"></div>
          <div class="row">
            <a class="button ghost" href="/web/">先进入应用</a
            ><a id="finish" class="button primary" href="/web/" hidden
              >开始使用 OpenBiliClaw →</a
            >
          </div>
        </section>
      </div>
    </main>
    <script type="module">
      import {
        request,
        readSse,
        escapeHtml,
        errorMessage,
        safeWebUrl,
      } from "/m/js/vnext-api.js";
      const sourceNames = {
        bilibili: "Bilibili",
        xiaohongshu: "小红书",
        douyin: "抖音",
        youtube: "YouTube",
        twitter: "X",
        zhihu: "知乎",
        reddit: "Reddit",
      };
      const panels = [...document.querySelectorAll(".panel")],
        dots = [...document.querySelectorAll(".dot")];
      function step(index) {
        panels.forEach((el, i) => el.classList.toggle("active", i === index));
        dots.forEach((el, i) => {
          el.classList.toggle("active", i === index);
          el.classList.toggle("done", i < index);
        });
      }
      function message(id, text, tone = "info") {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = `msg show ${tone}`;
      }
      async function loadAi() {
        try {
          const auth = await request("v1_auth_status");
          if (auth.enabled && !auth.authenticated) {
            document.getElementById("loginBox").hidden = false;
            return;
          }
          const health = await request("v1_system_ai_health");
          const aliases = new Map(
            (health.aliases || []).map((item) => [item.alias, item]),
          );
          document.getElementById("aliasList").innerHTML = [
            "obc-interactive",
            "obc-analysis",
            "obc-embedding",
          ]
            .map((alias) => {
              const item = aliases.get(alias);
              const ready = Boolean(item?.available);
              return `<div class="alias"><strong>${escapeHtml(alias)}</strong><span class="${ready ? "ok" : "bad"}">${ready ? "可用" : escapeHtml(item?.reason || "未配置")}</span></div>`;
            })
            .join("");
          const link = document.getElementById("adminLink");
          const adminUrl = safeWebUrl(health.admin_url);
          if (adminUrl) {
            link.href = adminUrl;
            link.hidden = false;
          }
          document.getElementById("nextAi").disabled = !health.proxy_reachable;
          if (!health.proxy_reachable)
            message(
              "aiMessage",
              "LiteLLM Proxy 暂不可达，请在 Admin 中完成模型配置后重试。",
              "err",
            );
        } catch (error) {
          message("aiMessage", errorMessage(error), "err");
        }
      }
      async function loadSources() {
        try {
          const sources = await request("v1_sources_list");
          document.getElementById("sourceList").innerHTML = sources
            .map(
              (source, index) =>
                `<label class="source"><input type="checkbox" value="${escapeHtml(source.source_id)}" ${index === 0 ? "checked" : ""}><span><strong>${escapeHtml(source.display_name || sourceNames[source.source_id])}</strong><small>${escapeHtml((source.capabilities || []).join(" · "))}</small></span></label>`,
            )
            .join("");
        } catch (error) {
          message("sourceMessage", errorMessage(error), "err");
        }
      }
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (event) => {
          event.preventDefault();
          try {
            await request("v1_auth_login", {
              body: { password: document.getElementById("password").value },
            });
            document.getElementById("loginBox").hidden = true;
            await loadAi();
          } catch (error) {
            message("aiMessage", errorMessage(error, "密码不正确"), "err");
          }
        });
      document.getElementById("nextAi").addEventListener("click", async () => {
        step(1);
        await loadSources();
      });
      document
        .querySelector("[data-back]")
        .addEventListener("click", () => step(0));
      document.getElementById("start").addEventListener("click", async () => {
        const source_ids = [
          ...document.querySelectorAll("#sourceList input:checked"),
        ].map((el) => el.value);
        if (!source_ids.length) {
          message("sourceMessage", "至少选择一个内容源。", "err");
          return;
        }
        step(2);
        try {
          const run = await request("v1_onboarding_start", {
            body: { source_ids },
          });
          await readSse(
            "v1_onboarding_events",
            { path: { run_id: run.id } },
            ({ event, data }) => {
              if (event === "progress") {
                const pct = Math.round((data.run?.progress || 0) * 100);
                document.getElementById("progressBar").style.width = `${pct}%`;
                document.getElementById("progressLabel").textContent =
                  `${data.stage} · ${data.run?.status || "pending"} · ${pct}%`;
              } else if (event === "done") {
                document.getElementById("progressBar").style.width = "100%";
                document.getElementById("progressLabel").textContent =
                  "画像与发现流已准备好";
                message(
                  "runMessage",
                  "初始化完成。之后的同步和补货会由后台任务自动维护。",
                  "ok",
                );
                document.getElementById("finish").hidden = false;
              } else if (event === "error")
                message(
                  "runMessage",
                  data.message || "初始化失败，请稍后重试。",
                  "err",
                );
            },
          );
        } catch (error) {
          message("runMessage", errorMessage(error), "err");
        }
      });
      loadAi();
    </script>
  </body>
</html>

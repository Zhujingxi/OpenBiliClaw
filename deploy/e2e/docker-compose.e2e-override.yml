name: obc-e2e-main

services:
  ollama:
    container_name: obc-e2e-ollama
    volumes:
      # Keep the pre-existing E2E ollama store (bge-m3 already present) so
      # rebuilds never re-pull the model.
      - obc-e2e-main_openbiliclaw_ollama:/root/.ollama

  openbiliclaw-backend:
    container_name: obc-e2e-backend
    ports: !override
      - "18421:8420"
    volumes:
      # Pin the pre-existing E2E volumes (created under project name
      # obc-e2e-main from the legacy /tmp stack) so the first-run state is
      # preserved across relocations and rebuilds.
      - obc-e2e-main_openbiliclaw_config:/app/runtime
      - obc-e2e-main_openbiliclaw_data:/app/runtime/data
      - obc-e2e-main_openbiliclaw_logs:/app/runtime/logs

volumes:
  obc-e2e-main_openbiliclaw_config:
    external: true
  obc-e2e-main_openbiliclaw_data:
    external: true
  obc-e2e-main_openbiliclaw_logs:
    external: true
  obc-e2e-main_openbiliclaw_ollama:
    external: true

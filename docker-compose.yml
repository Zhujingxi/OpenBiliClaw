services:
  litellm-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_POSTGRES_PASSWORD:?Set LITELLM_POSTGRES_PASSWORD to a generated hex secret}
    volumes:
      - openbiliclaw_litellm_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  litellm:
    # Pinned upstream version tag; never pass provider credentials through
    # Compose. Add them to the persistent LiteLLM database through /ui.
    image: ghcr.io/berriai/litellm:v1.92.0
    depends_on:
      litellm-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://litellm:${LITELLM_POSTGRES_PASSWORD:?Set LITELLM_POSTGRES_PASSWORD to a generated hex secret}@litellm-postgres:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?Set LITELLM_MASTER_KEY to a generated sk-prefixed secret}
      STORE_MODEL_IN_DB: "True"
    command: ["--config=/app/config.yaml"]
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:${LITELLM_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/readiness', timeout=4)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      OPENBILICLAW_DATABASE_URL: sqlite:////app/runtime/data/vnext/openbiliclaw.db
    command: ["openbiliclaw", "db", "migrate"]
    volumes:
      - openbiliclaw_data:/app/runtime/data
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      # The Dockerfile only depends on python:3.11-slim, which is
      # published as a multi-arch manifest. ``docker compose build``
      # picks the architecture matching the host (amd64 on Intel,
      # arm64 on Apple Silicon / Raspberry Pi). To explicitly cross-
      # build a release image, use buildx:
      #   docker buildx build --platform linux/amd64,linux/arm64 \
      #     -t openbiliclaw-backend:vX.Y.Z .
    depends_on:
      migrate:
        condition: service_completed_successfully
      litellm:
        condition: service_healthy
    environment:
      OPENBILICLAW_PROJECT_ROOT: /app/runtime
      # vNext typed AI calls only these internal proxy settings. Provider
      # credentials stay in LiteLLM and are never injected into this service.
      OPENBILICLAW_LITELLM_BASE_URL: http://litellm:4000
      OPENBILICLAW_LITELLM_API_KEY: ${LITELLM_MASTER_KEY:?Set LITELLM_MASTER_KEY to a generated sk-prefixed secret}
      OPENBILICLAW_LITELLM_ADMIN_URL: ${OPENBILICLAW_LITELLM_ADMIN_URL:-http://127.0.0.1:${LITELLM_PORT:-4000}/ui}
      OPENBILICLAW_DATABASE_URL: sqlite:////app/runtime/data/vnext/openbiliclaw.db
      OPENBILICLAW_HUEY_PATH: /app/runtime/data/vnext/huey.db
      OPENBILICLAW_SECRET_KEY: ${OPENBILICLAW_SECRET_KEY:?Set OPENBILICLAW_SECRET_KEY to a generated secret}
      OPENBILICLAW_ACCESS_TOKEN: ${OPENBILICLAW_ACCESS_TOKEN:?Set OPENBILICLAW_ACCESS_TOKEN to a generated secret}
      OPENBILICLAW_WEB_PASSWORD_HASH: ${OPENBILICLAW_WEB_PASSWORD_HASH:?Set OPENBILICLAW_WEB_PASSWORD_HASH to the installer-generated scrypt hash}
      OPENBILICLAW_SESSION_SECRET: ${OPENBILICLAW_SESSION_SECRET:?Set OPENBILICLAW_SESSION_SECRET to a generated secret}
      OPENBILICLAW_EXTENSION_ACCESS_KEYS: ${OPENBILICLAW_EXTENSION_ACCESS_KEYS:?Set OPENBILICLAW_EXTENSION_ACCESS_KEYS to installer-generated digest records}
      OPENBILICLAW_API_PORT: ${OPENBILICLAW_API_PORT:-8420}
      # OPENBILICLAW_XHS_SIDECAR_URL: http://xhs-sidecar:5556  # sidecar removed — extension extracts metadata from DOM
    command: ["openbiliclaw", "serve", "--host", "0.0.0.0", "--port", "${OPENBILICLAW_API_PORT:-8420}"]
    # ``host.docker.internal`` resolves the host machine for explicit proxy
    # configuration through OPENBILICLAW_PROXY_HOST.
    # Required on Linux Docker; auto-provided by Docker Desktop on
    # Mac / Windows. The ``host-gateway`` magic value tells the engine
    # to inject the right address per platform.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPENBILICLAW_API_HOST:-0.0.0.0}:${OPENBILICLAW_API_PORT:-8420}:${OPENBILICLAW_API_PORT:-8420}"
    volumes:
      - openbiliclaw_data:/app/runtime/data
      - openbiliclaw_logs:/app/runtime/logs
    # Compose-level healthcheck mirrors the Dockerfile HEALTHCHECK so
    # ``docker compose ps`` shows ``healthy`` only when vNext readiness
    # returns 200, not just when the container process is alive.
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request,sys; port=os.getenv('OPENBILICLAW_API_PORT','8420'); sys.exit(0 if urllib.request.urlopen(f'http://127.0.0.1:{port}/api/v1/system/readiness', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      litellm:
        condition: service_healthy
    environment:
      OPENBILICLAW_DATABASE_URL: sqlite:////app/runtime/data/vnext/openbiliclaw.db
      OPENBILICLAW_HUEY_PATH: /app/runtime/data/vnext/huey.db
      OPENBILICLAW_LITELLM_BASE_URL: http://litellm:4000
      OPENBILICLAW_LITELLM_API_KEY: ${LITELLM_MASTER_KEY:?Set LITELLM_MASTER_KEY to a generated sk-prefixed secret}
      OPENBILICLAW_SECRET_KEY: ${OPENBILICLAW_SECRET_KEY:?Set OPENBILICLAW_SECRET_KEY to a generated secret}
      OPENBILICLAW_WORKERS: "4"
      OPENBILICLAW_WORKER_RUNTIME_FACTORY: openbiliclaw.infrastructure.jobs.worker:database_runtime_factory
    command: ["openbiliclaw", "worker", "--workers", "4"]
    volumes:
      - openbiliclaw_data:/app/runtime/data
    # Running PID 1 is necessary but insufficient: the probe also requires the
    # application schema at Alembic head and an integrity-readable Huey queue.
    healthcheck:
      test: ["CMD", "python", "-m", "openbiliclaw.infrastructure.jobs.health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

volumes:
  openbiliclaw_data:
  openbiliclaw_logs:
  openbiliclaw_litellm_postgres:

name: Publish Docker Image

# Builds and pushes the multi-arch backend image to GHCR so Docker users
# can `docker compose -f docker-compose.prebuilt.yml up -d` without
# cloning or building anything.
#
# Triggers:
#   - backend-v* tag push: publishes ghcr.io/.../openbiliclaw-backend:<version> + :latest
#   - workflow_dispatch:   publishes from the selected ref using the
#     pyproject version (+ :latest) — useful for seeding the first image.

on:
  push:
    tags:
      - "backend-v*"
  workflow_dispatch:

# contents: write is needed by the aggregate-release sync step below.
permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/whiteguo233/openbiliclaw-backend
  OLLAMA_IMAGE: ghcr.io/whiteguo233/openbiliclaw-ollama

jobs:
  publish:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve version and tags
        id: meta
        shell: python
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          import os
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = str(pyproject["project"]["version"])

          release_tag = os.environ["RELEASE_TAG"]
          if os.environ["EVENT_NAME"] == "push" and release_tag.startswith("backend-v"):
              expected = release_tag.removeprefix("backend-v")
              if version != expected:
                  raise SystemExit(
                      f"backend tag {release_tag} does not match pyproject version {version}"
                  )

          image = os.environ["IMAGE"]
          ollama_image = os.environ["OLLAMA_IMAGE"]
          tags = f"{image}:{version},{image}:latest"
          ollama_tags = f"{ollama_image}:{version},{ollama_image}:latest"
          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as handle:
              handle.write(f"version={version}\n")
              handle.write(f"tags={tags}\n")
              handle.write(f"ollama_tags={ollama_tags}\n")

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Bundled Ollama image with bge-m3 baked in (~1.1GB). Built here so the
      # prebuilt compose reaches embedding-ready offline. Separate cache scope
      # so it doesn't thrash the backend image cache. The Dockerfile pulls the
      # model at build and verifies its digest against the Task 0 allowlist.
      - name: Build and push bundled Ollama image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ollama-bundled.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.ollama_tags }}
          cache-from: type=gha,scope=ollama
          cache-to: type=gha,mode=max,scope=ollama

      # The docker build finishes well after the backend-channel sync
      # ran, so re-sync the aggregate release here to flip the Docker
      # line from "Not published yet." to the pullable image reference.
      # Tag pushes only — a manual dispatch mid-cycle must not create
      # the next version's aggregate release early.
      - name: Update aggregate latest release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          CHANNEL: docker
        run: bash .github/scripts/sync-aggregate-release.sh

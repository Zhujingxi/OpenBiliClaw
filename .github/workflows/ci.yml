name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      # stdlib-only, runs before dependency install for fast fail on
      # inconsistent version fields (see scripts/release.py VERSION_FILES)
      - name: Check release version consistency
        run: python scripts/release.py --check

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Check Ruff formatting
        run: uv run --frozen ruff format --check src/ tests/

      - name: Run Ruff
        run: uv run --frozen ruff check src/ tests/

      - name: Run MyPy
        run: uv run --frozen mypy src/

      - name: Check architecture imports
        run: uv run --frozen lint-imports

      - name: Check generated OpenAPI clients
        run: node openapi/generate-client.mjs --check

      - name: Run root Node tests when present
        shell: bash
        run: |
          shopt -s nullglob
          test_files=(tests/js/*.test.mjs)
          if ((${#test_files[@]})); then
            node --test "${test_files[@]}"
          fi

      - name: Run pytest
        run: uv run --frozen pytest -q tests/vnext --cov --cov-report=term-missing

      - name: Validate Compose distributions
        env:
          LITELLM_POSTGRES_PASSWORD: test-postgres-password
          LITELLM_MASTER_KEY: sk-test-master-key
          OPENBILICLAW_SECRET_KEY: test-source-secret
          OPENBILICLAW_ACCESS_TOKEN: test-access-token
          OPENBILICLAW_SESSION_SECRET: test-session-secret
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.prebuilt.yml config --quiet

  extension-build:
    name: Check and build browser extension
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: extension

      - name: Check generated API client
        run: npm run api:check
        working-directory: extension

      - name: Typecheck extension
        run: npm run typecheck
        working-directory: extension

      - name: Test extension
        run: npm test
        working-directory: extension

      - name: Build Chrome extension
        run: npm run build
        working-directory: extension

      - name: Build Firefox extension
        run: npm run build:firefox
        working-directory: extension

      - name: Lint Firefox extension
        run: npx web-ext lint --source-dir dist-firefox
        working-directory: extension

      - name: Verify Firefox manifest at dist-firefox root
        shell: bash
        working-directory: extension
        run: |
          test -f dist-firefox/manifest.json
          # Confirm version was injected from manifest.json
          chrome_version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf-8')).version)")
          firefox_version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('dist-firefox/manifest.json','utf-8')).version)")
          if [ "$chrome_version" != "$firefox_version" ]; then
            echo "version mismatch: manifest.json=$chrome_version vs dist-firefox/manifest.json=$firefox_version"
            exit 1
          fi
          echo "Firefox manifest version $firefox_version matches manifest.json"

  retained-web-journeys-e2e:
    name: Retained web journeys E2E
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra browser

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Sanitize apt sources for Playwright
        shell: bash
        run: |
          sudo find /etc/apt/sources.list.d -type f \
            \( -name "*microsoft*" -o -name "*azure-cli*" \) \
            -print -delete || true
          sudo grep -rlE 'packages\.microsoft\.com|azure-cli' /etc/apt/sources.list.d 2>/dev/null \
            | xargs -r sudo rm -f || true
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i.bak '/packages\.microsoft\.com/d;/azure-cli/d' /etc/apt/sources.list
          fi

      - name: Install Playwright Chromium
        run: uv run --frozen python -m playwright install --with-deps chromium

      - name: Run retained web journeys E2E
        run: uv run --frozen pytest -q tests/vnext/test_retained_web_journeys_e2e.py

  docker-build:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: openbiliclaw-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check operational CLI in the image
        run: docker run --rm openbiliclaw-backend:ci openbiliclaw --help

  docker-product-e2e:
    name: Credential-free Docker product E2E
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run disposable Docker product journey with DB-backed alias setup
        run: bash scripts/test-docker-e2e.sh

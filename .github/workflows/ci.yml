name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # stdlib-only, runs before dependency install for fast fail on
      # inconsistent version fields (see scripts/release.py VERSION_FILES)
      - name: Check release version consistency
        run: python scripts/release.py --check

      - name: Install dependencies
        # Include the optional `x` extra (twitter-cli) so the X-source test
        # suite (tests/test_x_client.py etc.) can construct real tweet objects
        # and run; without it those tests error with ModuleNotFoundError.
        run: python -m pip install -e ".[dev,x]"

      - name: Run Ruff
        run: python -m ruff check src/ tests/

      - name: Run MyPy (capture output for baseline comparator)
        # `continue-on-error` so the baseline comparator decides whether the
        # diagnostics are acceptable; new diagnostics fail the next step.
        # GitHub's default shell runs with `bash -e -o pipefail`, and
        # continue-on-error does NOT disable shell errexit — so the tool
        # invocation is wrapped in an explicit `set +e`/`set -e` region and
        # its status is captured immediately from PIPESTATUS[0] (the left
        # side of the `tee` pipeline), otherwise an expected nonzero mypy
        # exit would abort the script before build/mypy.status is written.
        continue-on-error: true
        run: |
          mkdir -p build
          set -o pipefail
          set +e
          python -m mypy src/ 2>&1 | tee build/mypy.txt
          mypy_status=${PIPESTATUS[0]}
          set -e
          echo "mypy_exit=$mypy_status" > build/mypy.status

      - name: Run pytest (single run, emits JUnit XML + coverage)
        # Single-run collection per the refactor plan: JUnit XML and coverage
        # are emitted in the same pass that produces pass/fail, so the
        # baseline comparator never re-runs the suite. Any failure that
        # appears here must be explained by tests/contracts/quality-baseline.json
        # or the comparator fails the next step (fail-closed). The aggregate-
        # release Python-picker failure previously allowlisted here was fixed
        # in f6123bcc and removed from the baseline; recurrence now fails CI.
        # Same errexit guard as the mypy step: `set +e` around the expected-
        # to-fail invocation, capture `$?` immediately, then re-enable `-e`
        # before writing build/pytest.status.
        continue-on-error: true
        run: |
          mkdir -p build
          set +e
          python -m pytest -q \
            --junitxml=build/pytest-junit.xml \
            --cov=openbiliclaw --cov-report=xml:build/coverage.xml
          pytest_status=$?
          set -e
          echo "pytest_exit=$pytest_status" > build/pytest.status

      - name: Check quality baseline (fail-closed)
        # Compares the live pytest/mypy/coverage outputs against the
        # normalized baseline in tests/contracts/quality-baseline.json.
        # New pytest failures, new mypy diagnostics, new skips, missing
        # files, or unparseable output all fail the job here. A nonzero
        # mypy/pytest exit is allowed ONLY when the comparator can account
        # for every diagnostic/failure via the baseline allowlist; a tool
        # crash or missing summary grammar fails closed.
        run: |
          cat build/mypy.status build/pytest.status
          MYPY_EXIT=$(cut -d= -f2 build/mypy.status)
          PYTEST_EXIT=$(cut -d= -f2 build/pytest.status)
          python scripts/check_quality_baseline.py \
            --junit-xml build/pytest-junit.xml \
            --mypy-output build/mypy.txt \
            --coverage-xml build/coverage.xml \
            --mypy-exit-code "$MYPY_EXIT" \
            --pytest-exit-code "$PYTEST_EXIT"

  extension-firefox-build:
    name: Smoke-build Firefox extension
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: extension

      - name: Build Firefox extension
        run: npm run build:firefox
        working-directory: extension

      - name: Verify Firefox manifest at dist-firefox root
        shell: bash
        working-directory: extension
        run: |
          test -f dist-firefox/manifest.json
          # Confirm version was injected from manifest.json
          chrome_version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf-8')).version)")
          firefox_version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('dist-firefox/manifest.json','utf-8')).version)")
          if [ "$chrome_version" != "$firefox_version" ]; then
            echo "version mismatch: manifest.json=$chrome_version vs dist-firefox/manifest.json=$firefox_version"
            exit 1
          fi
          echo "Firefox manifest version $firefox_version matches manifest.json"

  js-lint:
    name: Lint JS/TS (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dev tooling
        run: npm ci

      - name: ESLint
        run: npx eslint .

      - name: Prettier (changed files only)
        shell: bash
        run: |
          git fetch origin main --depth=1 || true
          changed=$(git diff --name-only origin/main...HEAD -- '*.js' '*.mjs' '*.ts' '*.json' 2>/dev/null || true)
          if [ -n "$changed" ]; then
            echo "$changed" | xargs npx prettier --check --ignore-unknown
          else
            echo "no changed JS/TS files"
          fi

  extension-test:
    name: Extension typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: extension

      - name: Typecheck (src + popup + tests projects)
        run: npm run typecheck
        working-directory: extension

      - name: Run extension tests
        run: npm test
        working-directory: extension

  web-test:
    name: Web JS build + unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dev tooling
        run: npm ci

      - name: Verify checked-in web runtime assets
        # Python/Docker/desktop installs intentionally have no root Node step.
        # Fail if a migrated .ts source and its distributable .js sibling drift.
        run: npm run check:web-build

      - name: Run web JS tests
        run: node --test tests/js/

  web-guided-init-e2e:
    name: Web guided-init E2E
    runs-on: ubuntu-latest
    needs: [test, web-test]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify checked-in web runtime assets
        run: |
          npm ci
          npm run check:web-build

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev,browser]"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Sanitize apt sources for Playwright
        shell: bash
        run: |
          sudo find /etc/apt/sources.list.d -type f \
            \( -name "*microsoft*" -o -name "*azure-cli*" \) \
            -print -delete || true
          sudo grep -rlE 'packages\.microsoft\.com|azure-cli' /etc/apt/sources.list.d 2>/dev/null \
            | xargs -r sudo rm -f || true
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i.bak '/packages\.microsoft\.com/d;/azure-cli/d' /etc/apt/sources.list
          fi

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run web guided-init E2E
        run: python -m pytest -q tests/test_web_guided_init_e2e.py

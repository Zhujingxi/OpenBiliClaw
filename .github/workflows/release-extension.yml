name: Release Extension Package

on:
  push:
    tags:
      - "extension-v*"

permissions:
  contents: write

env:
  FIREFOX_SIGNING_ENABLED: ${{ vars.FIREFOX_SIGNING_ENABLED != 'false' }}

jobs:
  build:
    name: Build extension package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Verify extension version matches release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          # GitHub Actions does not accept `shell: node` — use bash + jq
          # (preinstalled on ubuntu-latest) for a portable version check.
          expected="${RELEASE_TAG#extension-v}"
          manifest_version=$(jq -r .version extension/manifest.json)
          pkg_version=$(jq -r .version extension/package.json)
          if [ "$manifest_version" != "$expected" ]; then
            echo "extension release tag $RELEASE_TAG does not match manifest version $manifest_version"
            exit 1
          fi
          if [ "$pkg_version" != "$expected" ]; then
            echo "extension release tag $RELEASE_TAG does not match package version $pkg_version"
            exit 1
          fi

      - name: Install extension dependencies
        run: npm ci
        working-directory: extension

      - name: Build Chrome-compatible extension release archive
        run: npm run package
        working-directory: extension

      - name: Build Firefox extension release archive
        run: npm run package:firefox
        working-directory: extension

      - name: Sign Firefox extension release XPI
        if: env.FIREFOX_SIGNING_ENABLED == 'true'
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: npm run sign:firefox:only
        working-directory: extension

      - name: Verify extension release archives
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          expected="${RELEASE_TAG#extension-v}"
          chrome_archive="extension/openbiliclaw-extension-v${expected}.zip"
          firefox_archive="extension/openbiliclaw-extension-v${expected}-firefox.zip"
          firefox_xpi="extension/openbiliclaw-extension-v${expected}-firefox.xpi"
          if [ ! -f "$chrome_archive" ]; then
            echo "missing Chrome-compatible extension archive: $chrome_archive"
            exit 1
          fi
          if [ ! -f "$firefox_archive" ]; then
            echo "missing Firefox extension archive: $firefox_archive"
            exit 1
          fi
          if [ "$FIREFOX_SIGNING_ENABLED" = "true" ] && [ ! -f "$firefox_xpi" ]; then
            echo "missing signed Firefox XPI: $firefox_xpi"
            exit 1
          fi
          echo "verified Chrome-compatible release archive: $chrome_archive"
          echo "verified Firefox release archive: $firefox_archive"
          if [ -f "$firefox_xpi" ]; then
            echo "verified signed Firefox XPI: $firefox_xpi"
          fi

      - name: Upload packaged extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-package
          path: |
            extension/openbiliclaw-extension-v*.zip
            extension/openbiliclaw-extension-v*.xpi
          if-no-files-found: error

  publish-release:
    name: Publish extension release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download packaged extension artifact
        uses: actions/download-artifact@v8
        with:
          name: extension-package
          path: release-artifacts

      - name: Verify downloaded extension artifacts
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          expected="${RELEASE_TAG#extension-v}"
          chrome_archive="release-artifacts/openbiliclaw-extension-v${expected}.zip"
          firefox_archive="release-artifacts/openbiliclaw-extension-v${expected}-firefox.zip"
          firefox_xpi="release-artifacts/openbiliclaw-extension-v${expected}-firefox.xpi"
          if [ ! -f "$chrome_archive" ]; then
            echo "missing Chrome-compatible extension archive: $chrome_archive"
            exit 1
          fi
          if [ ! -f "$firefox_archive" ]; then
            echo "missing Firefox extension archive: $firefox_archive"
            exit 1
          fi
          if [ "$FIREFOX_SIGNING_ENABLED" = "true" ] && [ ! -f "$firefox_xpi" ]; then
            echo "missing signed Firefox XPI: $firefox_xpi"
            exit 1
          fi
          echo "Chrome-compatible release artifact ready: $chrome_archive"
          echo "Firefox release artifact ready: $firefox_archive"
          if [ -f "$firefox_xpi" ]; then
            echo "Signed Firefox XPI ready: $firefox_xpi"
          fi

      - name: Create GitHub Release and upload extension package
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --generate-notes
          else
            gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false
          fi
          expected="${RELEASE_TAG#extension-v}"
          assets=(
            "release-artifacts/openbiliclaw-extension-v${expected}.zip"
            "release-artifacts/openbiliclaw-extension-v${expected}-firefox.zip"
          )
          if [ "$FIREFOX_SIGNING_ENABLED" = "true" ]; then
            assets+=("release-artifacts/openbiliclaw-extension-v${expected}-firefox.xpi")
          fi
          for asset in "${assets[@]}"; do
            for attempt in 1 2 3; do
              if gh release upload "$RELEASE_TAG" "$asset" --repo "$GITHUB_REPOSITORY" --clobber; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
              sleep "$((attempt * 5))"
            done
          done

      - name: Update aggregate latest release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          CHANNEL: extension
          ASSET_GLOBS: release-artifacts/openbiliclaw-extension-v*.zip release-artifacts/openbiliclaw-extension-v*.xpi
        run: bash .github/scripts/sync-aggregate-release.sh

name: Release Desktop Installers

# Tag-triggered auto-publish. Push a `desktop-v*` tag (e.g. `desktop-v0.3.102`)
# and this builds the macOS (.dmg) + Windows (.exe) installers and publishes them
# to a GitHub *pre-release* (the app is unsigned / pre-alpha). This is the
# auto-publish counterpart to build-installers.yml (manual, artifacts-only).
#
# Scope note: the backend SOURCE stays source-only (`backend-v*` tags are git
# markers, no Release) — only the desktop installer BINARIES ship here.
#
# Arch note: only macOS arm64 + Windows x64 are auto-built. The macos-13 (Intel
# x64) runner is scarce and routinely queues for a very long time; gating every
# release on it would stall the whole publish. Build the Intel .dmg on demand via
# the manual build-installers.yml and attach it to the release if needed.
on:
  push:
    tags:
      - "desktop-v*"

# Needs write access to publish the Release (build-installers.yml stays read-only).
permissions:
  contents: write

jobs:
  macos:
    name: macOS installer (.dmg, arm64, ${{ matrix.variant }})
    runs-on: macos-14 # Apple Silicon
    strategy:
      # fail-fast off so a failing variant doesn't cancel the other.
      fail-fast: false
      matrix:
        variant: [lean, with-embedding]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project + PyInstaller
        run: |
          python -m pip install --upgrade pip
          # [packaging] pulls pyinstaller + pystray + Pillow + pyobjc (menu-bar tray).
          pip install -e ".[packaging]"

      - name: Download official Ollama.app runtime
        run: |
          curl -L https://github.com/ollama/ollama/releases/latest/download/Ollama-darwin.zip -o Ollama-darwin.zip
          unzip -q Ollama-darwin.zip -d ollama-app
          test -x ollama-app/Ollama.app/Contents/Resources/ollama
          test -x ollama-app/Ollama.app/Contents/Resources/llama-server
          test -f ollama-app/Ollama.app/Contents/Resources/libllama-server-impl.dylib
          test -f ollama-app/Ollama.app/Contents/Resources/libggml.dylib
          echo "OPENBILICLAW_OLLAMA_BIN=$PWD/ollama-app/Ollama.app/Contents/Resources/ollama" >> "$GITHUB_ENV"

      - name: Resolve version
        id: ver
        run: |
          # desktop-v0.3.102 -> v0.3.102 (a tagged release IS the version; no SHA stamp).
          v="${GITHUB_REF_NAME#desktop-}"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Produce bge-m3 seed (with-embedding only)
        if: matrix.variant == 'with-embedding'
        run: |
          export OLLAMA_HOST=127.0.0.1:11500
          "$OPENBILICLAW_OLLAMA_BIN" serve &
          for i in $(seq 1 60); do curl -sf http://127.0.0.1:11500/api/version >/dev/null && break; sleep 1; done
          "$OPENBILICLAW_OLLAMA_BIN" pull bge-m3
          python packaging/make_model_seed.py --model bge-m3 --out packaging/model-seed \
            --expect-digest sha256:0c4c9c2a325fb1cdafec606e6809cb745f1cb26a6d919994400d27372303e276 \
            --expect-digest sha256:daec91ffb5dd0c27411bd71f29932917c49cf529a641d0168496c3a501e3062c \
            --expect-digest sha256:a406579cd136771c705c521db86ca7d60a6f3de7c9b5460e6193a2df27861bde

      - name: Build .app + .dmg (auto-bundles ollama)
        run: |
          flags=""
          [ "${{ matrix.variant }}" = "with-embedding" ] && flags="--bundle-embedding"
          python packaging/build.py --clean $flags --archive-version "${{ steps.ver.outputs.version }}-arm64"

      - name: Enforce GitHub asset size limit (< 2GB)
        run: |
          for f in dist/release/*.dmg dist/release/*.zip; do
            [ -e "$f" ] || continue
            sz=$(stat -f%z "$f")
            printf '%s = %s MiB\n' "$f" "$((sz / 1024 / 1024))"
            [ "$sz" -le 2147483648 ] || { echo "ERROR: $f exceeds GitHub's 2GB asset limit"; exit 1; }
          done

      - uses: actions/upload-artifact@v7
        with:
          name: openbiliclaw-macos-installer-arm64-${{ matrix.variant }}
          path: |
            dist/release/*.dmg
            dist/release/*.zip
          if-no-files-found: error

  windows:
    name: Windows installer (.exe, ${{ matrix.variant }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [lean, with-embedding]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project + PyInstaller
        run: |
          python -m pip install --upgrade pip
          # [packaging] pulls pyinstaller + pystray + Pillow (tray desktop mode).
          pip install -e ".[packaging]"

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          v="${GITHUB_REF_NAME#desktop-}"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "bare=${v#v}" >> "$GITHUB_OUTPUT"
          numeric="$(python -c 'import re,sys; m=re.match(r"v?(\d+)\.(\d+)\.(\d+)", sys.argv[1]); print(f"{m.group(1)}.{m.group(2)}.{m.group(3)}.0" if m else "0.0.0.0")' "$v")"
          echo "version_info=$numeric" >> "$GITHUB_OUTPUT"
          if [ "${{ matrix.variant }}" = "with-embedding" ]; then
            echo "variant_suffix=-with-embedding" >> "$GITHUB_OUTPUT"
          else
            echo "variant_suffix=" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Ollama (staged now; also used to produce the seed)
        id: ollama
        shell: pwsh
        run: |
          $ver = "0.30.6"
          Invoke-WebRequest "https://github.com/ollama/ollama/releases/download/v$ver/ollama-windows-amd64.zip" -OutFile ollama.zip
          Expand-Archive ollama.zip -DestinationPath ollama_win -Force
          $exe = Get-ChildItem ollama_win -Recurse -Filter ollama.exe | Select-Object -First 1
          if (-not $exe) { throw "ollama.exe not found in ollama-windows-amd64.zip" }
          "path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Produce bge-m3 seed (with-embedding only)
        if: matrix.variant == 'with-embedding'
        shell: pwsh
        run: |
          $env:OLLAMA_HOST = "127.0.0.1:11500"
          Start-Process -FilePath "${{ steps.ollama.outputs.path }}" -ArgumentList "serve" -NoNewWindow
          for ($i = 0; $i -lt 60; $i++) { try { Invoke-WebRequest "http://127.0.0.1:11500/api/version" -UseBasicParsing | Out-Null; break } catch { Start-Sleep 1 } }
          & "${{ steps.ollama.outputs.path }}" pull bge-m3
          python packaging\make_model_seed.py --model bge-m3 --out packaging\model-seed `
            --expect-digest sha256:0c4c9c2a325fb1cdafec606e6809cb745f1cb26a6d919994400d27372303e276 `
            --expect-digest sha256:daec91ffb5dd0c27411bd71f29932917c49cf529a641d0168496c3a501e3062c `
            --expect-digest sha256:a406579cd136771c705c521db86ca7d60a6f3de7c9b5460e6193a2df27861bde

      - name: PyInstaller onedir build (ollama staged separately below)
        shell: pwsh
        run: |
          # Build the arg list as an array so the lean variant never passes an
          # empty-string argument (argparse rejects "" as an unrecognized arg).
          $buildArgs = @("--clean", "--no-bundle-ollama", "--archive-version", "${{ steps.ver.outputs.version }}")
          if ("${{ matrix.variant }}" -eq "with-embedding") { $buildArgs += "--bundle-embedding" }
          python packaging/build.py @buildArgs

      - name: Stage bundled Ollama (CPU runner only — bge-m3 embedding is CPU)
        shell: pwsh
        run: |
          $exe = Get-Item "${{ steps.ollama.outputs.path }}"
          Copy-Item $exe.FullName dist\OpenBiliClaw\ollama.exe -Force
          $lib = Join-Path $exe.Directory.FullName "lib"
          if (Test-Path $lib) {
            Copy-Item $lib dist\OpenBiliClaw\lib -Recurse -Force
            # Drop large GPU runners; keep the installer lean (embedding runs on CPU).
            Get-ChildItem dist\OpenBiliClaw\lib\ollama -Directory -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match 'cuda|rocm' } |
              Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Make bundled ollama windowless (PE subsystem console -> GUI)
        shell: pwsh
        run: |
          # A GUI-subsystem exe never allocates a console, so flip ollama.exe +
          # every bundled runner exe to GUI to stop the console/conhost flashing.
          $exes = @("dist\OpenBiliClaw\ollama.exe")
          $exes += (Get-ChildItem dist\OpenBiliClaw\lib -Recurse -Filter *.exe -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName })
          python packaging\patch_pe_subsystem.py @exes

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.bare }} /DMyAppVersionInfoVersion=${{ steps.ver.outputs.version_info }} /DMyAppVariantSuffix=${{ steps.ver.outputs.variant_suffix }} packaging\openbiliclaw.iss

      - name: Enforce GitHub asset size limit (< 2GB)
        shell: pwsh
        run: |
          Get-ChildItem dist\release\*.exe | ForEach-Object {
            $mib = [math]::Round($_.Length / 1MB)
            Write-Host "$($_.Name) = $mib MiB"
            if ($_.Length -gt 2147483648) { throw "$($_.Name) exceeds GitHub's 2GB asset limit" }
          }

      - uses: actions/upload-artifact@v7
        with:
          name: openbiliclaw-windows-installer-${{ matrix.variant }}
          path: dist/release/*.exe
          if-no-files-found: error

  publish:
    name: Publish desktop pre-release
    runs-on: ubuntu-latest
    needs: [macos, windows]
    # always() so a single failed build leg still ships the other installer
    # rather than blocking the whole release.
    if: ${{ always() }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download built installers
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: openbiliclaw-*
          merge-multiple: true

      - name: List downloaded installers
        run: ls -lhR release-artifacts || true

      - name: Publish GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          notes_file="$(mktemp)"
          cat > "$notes_file" <<'EOF'
          **实验性桌面安装包**（未签名 / 未公证，仅供尝鲜）。macOS DMG 内已放入首次打开说明；后端源码仍为 source-only，此处只发桌面应用二进制。

          ### macOS 安全阻挡
          - 当前 Release 是 ad-hoc signed、未 notarized。打开 DMG 后先看 `首次打开说明 First Launch.html`，把应用拖进「应用程序」，再右键 / Control-click `OpenBiliClaw.app` →「打开」→ 在弹窗里再点「打开」；或到「System Settings → Privacy & Security」点「Open Anyway / 仍要打开」。
          - 若提示“OpenBiliClaw.app 已损坏，无法打开”，通常是下载隔离属性导致。确认包来源可信后执行：`APP="/Applications/OpenBiliClaw.app"; xattr -dr com.apple.quarantine "$APP"`，然后再次打开应用。
          - **Windows**：SmartScreen 弹窗点「更多信息 → 仍要运行」。

          自带本地 Ollama + `bge-m3` embedding，开箱即用，常驻 macOS 菜单栏 / Windows 系统托盘。数据在 `~/OpenBiliClaw`（macOS / Linux）/ `%USERPROFILE%\OpenBiliClaw`（Windows），升级 / 卸载不动它。Intel mac（x64）.dmg 未自动构建，需要时用手动的 build-installers.yml 产出后补挂。
          EOF

          ensure_release() {
            if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease --notes-file "$notes_file"
              return
            fi

            for attempt in 1 2 3; do
              if gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --prerelease --generate-notes --notes-file "$notes_file"; then
                return
              fi
              if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease --notes-file "$notes_file"
                return
              fi
              if [ "$attempt" -eq 3 ]; then
                return 1
              fi
              sleep "$((attempt * 5))"
            done
          }

          ensure_release
          shopt -s nullglob
          assets=(release-artifacts/*.dmg release-artifacts/*.exe)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No installer assets found"
            exit 1
          fi
          for asset in "${assets[@]}"; do
            for attempt in 1 2 3; do
              if gh release upload "$RELEASE_TAG" "$asset" --repo "$GITHUB_REPOSITORY" --clobber; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
              sleep "$((attempt * 5))"
            done
          done

      - name: Update aggregate latest release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          CHANNEL: desktop
          ASSET_GLOBS: release-artifacts/*.dmg release-artifacts/*.exe
        run: bash .github/scripts/sync-aggregate-release.sh

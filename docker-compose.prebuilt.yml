# OpenBiliClaw backend via the prebuilt multi-arch image on GHCR.
#
# This two-file distribution needs no git clone or local build:
#
#   mkdir -p litellm
#   curl -fsSLO https://raw.githubusercontent.com/whiteguo233/OpenBiliClaw/main/docker-compose.prebuilt.yml
#   curl -fsSL https://raw.githubusercontent.com/whiteguo233/OpenBiliClaw/main/litellm/config.yaml -o litellm/config.yaml
#   # BEGIN private .env bootstrap
#   umask 077
#   touch .env
#   chmod 600 .env
#   ensure_secret() (
#     key=$1
#     prefix=${2-}
#     if ! grep -Eq "^${key}=[^[:space:]].*$" .env; then
#       printf '%s=%s%s\n' "$key" "$prefix" "$(openssl rand -hex 32)" >> .env
#     fi
#   )
#   ensure_secret LITELLM_POSTGRES_PASSWORD
#   ensure_secret LITELLM_MASTER_KEY sk-
#   ensure_secret OPENBILICLAW_SECRET_KEY
#   ensure_secret OPENBILICLAW_ACCESS_TOKEN
#   ensure_secret OPENBILICLAW_SESSION_SECRET
#   # END private .env bootstrap
#   docker compose --env-file .env -f docker-compose.prebuilt.yml config >/dev/null
#   docker compose --env-file .env -f docker-compose.prebuilt.yml up -d
#   # configure obc-interactive, obc-analysis, and obc-embedding at
#   # http://127.0.0.1:4000/ui
#   # then configure sources through /api/v1/onboarding. The packaged static
#   # Web and extension clients consume the generated vNext API contract.
#
# Upgrade to the newest release:
#
#   docker compose -f docker-compose.prebuilt.yml pull
#   docker compose -f docker-compose.prebuilt.yml up -d
#
# To build from source instead (customization / development), use the
# docker-compose.yml at the repository root — see docs/docker-deployment.md.

services:
  litellm-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_POSTGRES_PASSWORD:?Set LITELLM_POSTGRES_PASSWORD to a generated hex secret}
    volumes:
      - openbiliclaw_litellm_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  litellm:
    # The official image can boot from DATABASE_URL/LITELLM_MASTER_KEY alone;
    # STORE_MODEL_IN_DB makes provider setup persistent through /ui.
    image: ghcr.io/berriai/litellm:v1.92.0
    depends_on:
      litellm-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://litellm:${LITELLM_POSTGRES_PASSWORD:?Set LITELLM_POSTGRES_PASSWORD to a generated hex secret}@litellm-postgres:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?Set LITELLM_MASTER_KEY to a generated sk-prefixed secret}
      STORE_MODEL_IN_DB: "True"
    command: ["--config=/app/config.yaml"]
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:${LITELLM_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/readiness', timeout=4)"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    restart: unless-stopped

  migrate:
    image: ghcr.io/whiteguo233/openbiliclaw-backend:latest
    environment:
      OPENBILICLAW_DATABASE_URL: sqlite:////app/runtime/data/vnext/openbiliclaw.db
    command: ["openbiliclaw", "db", "migrate"]
    volumes:
      - openbiliclaw_data:/app/runtime/data
    restart: "no"

  api:
    # Multi-arch image (linux/amd64 + linux/arm64) published by
    # .github/workflows/release-docker.yml on every backend release.
    # Pin a specific version by replacing `latest` with the desired release.
    image: ghcr.io/whiteguo233/openbiliclaw-backend:latest
    depends_on:
      migrate:
        condition: service_completed_successfully
      litellm:
        condition: service_healthy
    environment:
      OPENBILICLAW_PROJECT_ROOT: /app/runtime
      OPENBILICLAW_LITELLM_BASE_URL: http://litellm:4000
      OPENBILICLAW_LITELLM_API_KEY: ${LITELLM_MASTER_KEY:?Set LITELLM_MASTER_KEY to a generated sk-prefixed secret}
      OPENBILICLAW_LITELLM_ADMIN_URL: ${OPENBILICLAW_LITELLM_ADMIN_URL:-}
      OPENBILICLAW_DATABASE_URL: sqlite:////app/runtime/data/vnext/openbiliclaw.db
      OPENBILICLAW_HUEY_PATH: /app/runtime/data/vnext/huey.db
      OPENBILICLAW_SECRET_KEY: ${OPENBILICLAW_SECRET_KEY:?Set OPENBILICLAW_SECRET_KEY to a generated secret}
      OPENBILICLAW_ACCESS_TOKEN: ${OPENBILICLAW_ACCESS_TOKEN:?Set OPENBILICLAW_ACCESS_TOKEN to a generated secret}
      OPENBILICLAW_WEB_PASSWORD_HASH: ${OPENBILICLAW_WEB_PASSWORD_HASH:-}
      OPENBILICLAW_SESSION_SECRET: ${OPENBILICLAW_SESSION_SECRET:?Set OPENBILICLAW_SESSION_SECRET to a generated secret}
      OPENBILICLAW_EXTENSION_ACCESS_KEYS: ${OPENBILICLAW_EXTENSION_ACCESS_KEYS:-[]}
    command: ["openbiliclaw", "serve", "--host", "0.0.0.0", "--port", "8420"]
    # ``host.docker.internal`` resolves an explicitly configured host proxy.
    # Required on Linux Docker; auto-provided by Docker Desktop on Mac/Windows.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8420:8420"
    volumes:
      - openbiliclaw_data:/app/runtime/data
      - openbiliclaw_logs:/app/runtime/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8420/api/v1/system/readiness', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  worker:
    image: ghcr.io/whiteguo233/openbiliclaw-backend:latest
    depends_on:
      migrate:
        condition: service_completed_successfully
      litellm:
        condition: service_healthy
    environment:
      OPENBILICLAW_DATABASE_URL: sqlite:////app/runtime/data/vnext/openbiliclaw.db
      OPENBILICLAW_HUEY_PATH: /app/runtime/data/vnext/huey.db
      OPENBILICLAW_LITELLM_BASE_URL: http://litellm:4000
      OPENBILICLAW_LITELLM_API_KEY: ${LITELLM_MASTER_KEY:?Set LITELLM_MASTER_KEY to a generated sk-prefixed secret}
      OPENBILICLAW_SECRET_KEY: ${OPENBILICLAW_SECRET_KEY:?Set OPENBILICLAW_SECRET_KEY to a generated secret}
      OPENBILICLAW_WORKERS: "4"
      OPENBILICLAW_WORKER_RUNTIME_FACTORY: openbiliclaw.infrastructure.jobs.worker:database_runtime_factory
    command: ["openbiliclaw", "worker", "--workers", "4"]
    volumes:
      - openbiliclaw_data:/app/runtime/data
    # Running PID 1 is necessary but insufficient: the probe also requires the
    # application schema at Alembic head and an integrity-readable Huey queue.
    healthcheck:
      test: ["CMD", "python", "-m", "openbiliclaw.infrastructure.jobs.health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

volumes:
  openbiliclaw_data:
  openbiliclaw_logs:
  openbiliclaw_litellm_postgres:

# OpenBiliClaw vNext deployment reference
#
# Mutable product settings are stored in the vNext SQLite database and managed
# through the Web settings UI or `/api/v1/settings`. Source-specific forms are
# described by `/api/v1/sources`; provider credentials and routing belong only
# in the LiteLLM Admin UI.
#
# The installer writes deployment secrets and process settings to a private
# `.env` file. Do not copy secret values into this tracked template.
#
# Required source-install environment variables:
#   OPENBILICLAW_LITELLM_BASE_URL=https://your-litellm.example/v1
#   OPENBILICLAW_LITELLM_API_KEY=<private LiteLLM virtual or master key>
#
# Installer-generated environment variables:
#   OPENBILICLAW_SECRET_KEY=<source credential encryption key>
#   OPENBILICLAW_ACCESS_TOKEN=<installer/API bearer token>
#   OPENBILICLAW_SESSION_SECRET=<Web session signing secret>
#   OPENBILICLAW_DATABASE_URL=sqlite:////absolute/path/data/vnext/openbiliclaw.db
#   OPENBILICLAW_HUEY_PATH=/absolute/path/data/vnext/huey.db
#
# Optional deployment variables:
#   OPENBILICLAW_LITELLM_ADMIN_URL=https://your-litellm.example/ui
#   OPENBILICLAW_WEB_PASSWORD_HASH=<scrypt password hash>
#   OPENBILICLAW_EXTENSION_ACCESS_KEYS=[]
#   OPENBILICLAW_PROXY_HOST=127.0.0.1
#   OPENBILICLAW_PROXY_PORT=7897
#   OPENBILICLAW_PROXY_TIMEOUT=1.0
#
# Docker Compose additionally generates LITELLM_POSTGRES_PASSWORD and
# LITELLM_MASTER_KEY. Provider API keys are configured in LiteLLM, never in an
# OpenBiliClaw environment file.

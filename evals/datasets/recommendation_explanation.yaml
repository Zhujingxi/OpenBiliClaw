name: recommendation_explanation_foundation_v1
cases:
  - name: concise_grounded_explanation
    inputs:
      profile:
        revision: 1
        narrative: "Likes concise, hands-on procedural modeling tutorials."
        facets: []
        confidence: 0.8
        created_at: "2026-07-17T00:00:00Z"
      content:
        id: "00000000-0000-0000-0000-000000000201"
        source_id: bilibili
        external_id: BV1foundation
        url: "https://www.bilibili.com/video/BV1foundation"
        title: "Geometry Nodes: A Practical Procedural Workflow"
        summary: "A focused walkthrough with a complete project."
        media_type: video
        metadata: {}
      assessment:
        id: "00000000-0000-0000-0000-000000000202"
        content_id: "00000000-0000-0000-0000-000000000201"
        profile_revision: 1
        relevance: 0.9
        quality: 0.8
        novelty: 0.6
        risk: 0.1
        topics:
          - "procedural modeling"
        explanation: "Strong match for practical procedural modeling."
    expected_output:
      explanation: "This practical Geometry Nodes walkthrough fits your interest in hands-on procedural modeling."
    metadata:
      rubric: "The explanation is concise and introduces no claims absent from the supplied facts."
      min_characters: 30
      max_characters: 180
      required_concepts:
        - "geometry nodes"
        - "procedural modeling"
        - "practical"
      minimum_concept_matches: 1
evaluators:
  - RecommendationExplanationInvariants
  - LLMJudge:
      rubric: >-
        Judge whether the recommendation is clear, concise, useful, and grounded only in the
        supplied profile, content, and assessment. Fail any explanation that invents facts or
        merely copies generic recommendation language.
      model: "openai:obc-analysis"
      include_input: true
      include_expected_output: false
      assertion:
        evaluation_name: recommendation_quality
        include_reason: true

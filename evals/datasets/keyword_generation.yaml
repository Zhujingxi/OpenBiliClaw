name: keyword_generation_foundation_v1
cases:
  - name: profile_to_source_neutral_queries
    inputs:
      profile:
        revision: 1
        narrative: "Likes concise, hands-on procedural modeling tutorials."
        facets: []
        confidence: 0.8
        created_at: "2026-07-17T00:00:00Z"
      limit: 4
    expected_output:
      keywords:
        - "procedural modeling tutorial"
        - "geometry nodes practical workflow"
        - "non-destructive 3D modeling"
        - "procedural material breakdown"
    metadata:
      rubric: "Queries are distinct, profile-grounded, and do not assume a specific source platform."
      min_keywords: 2
      max_keywords: 4
      required_concepts:
        - "procedural"
        - "modeling"
        - "geometry"
        - "3d"
      minimum_relevant_keywords: 2
      forbidden_source_terms:
        - "bilibili"
        - "youtube"
evaluators:
  - KeywordGenerationInvariants

<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #e9edf2; }
  body { display: flex; flex-direction: column; gap: 40px; padding: 40px; }

  .card {
    position: relative;
    width: 1280px;
    height: 640px;
    overflow: hidden;
    background:
      radial-gradient(120% 120% at 50% -12%, rgba(251,114,153,0.22), transparent 55%),
      radial-gradient(70% 80% at 6% 112%, rgba(53,174,222,0.16), transparent 60%),
      radial-gradient(60% 70% at 104% 26%, rgba(246,183,60,0.16), transparent 60%),
      linear-gradient(165deg, #fffdfa 0%, #fff6f3 56%, #feeef3 100%);
    box-shadow: inset 0 0 0 1px rgba(251,114,153,0.14);
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", "PingFang SC", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* subtle dot grid texture */
  .card::before {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(26,30,36,0.05) 1.1px, transparent 1.1px);
    background-size: 28px 28px;
    -webkit-mask-image: radial-gradient(120% 120% at 50% 30%, #000 35%, transparent 78%);
            mask-image: radial-gradient(120% 120% at 50% 30%, #000 35%, transparent 78%);
    opacity: 0.6;
  }

  /* top accent bar: gold -> pink -> blue */
  .topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: linear-gradient(90deg, #f6b73c 0%, #fb7299 50%, #35aede 100%);
  }

  .content {
    position: relative; z-index: 2;
    height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 84px 90px 76px;
  }

  /* brand row */
  .brand { display: flex; align-items: center; gap: 20px; }
  .brand .logo { width: 62px; height: 62px; display: block; }
  .wordmark {
    font-size: 42px; font-weight: 800; letter-spacing: -0.5px; color: #16181d;
  }
  .wordmark .b { color: #fb7299; }

  /* hero block — vertically centered, grows to fill */
  .hero-wrap {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px;
  }
  .hero {
    font-weight: 800; color: #15181d; line-height: 1.12; letter-spacing: -1px;
  }
  .sub { font-weight: 500; color: #3f4650; line-height: 1.3; }

  #card-en .hero { font-size: 64px; max-width: 1000px; }
  #card-zh .hero { font-size: 96px; letter-spacing: 2px; }
  #card-zh .sub  { font-size: 38px; letter-spacing: 1px; }

  /* platform legend */
  .platforms {
    display: flex; align-items: center; gap: 18px;
    font-size: 30px; font-weight: 600; color: #2a2f37;
  }
  .plat { display: inline-flex; align-items: center; gap: 11px; }
  .plat i { width: 15px; height: 15px; border-radius: 50%; background: var(--c); display: inline-block;
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--c) 18%, transparent); }
  .sep { color: #c8b9bf; font-weight: 400; }

  /* footer pills */
  .footer { display: flex; align-items: center; gap: 14px; }
  .pill {
    font-size: 22px; font-weight: 600; color: #8a5566;
    background: rgba(251,114,153,0.10);
    border: 1px solid rgba(251,114,153,0.22);
    padding: 9px 20px; border-radius: 999px; letter-spacing: 0.2px;
  }
</style>
</head>
<body>

  <!-- ================= ENGLISH ================= -->
  <div class="card" id="card-en">
    <div class="topbar"></div>
    <div class="content">
      <div class="brand">
        <svg class="logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="ring-en" x1="14" y1="20" x2="86" y2="86" gradientUnits="userSpaceOnUse">
              <stop stop-color="#ff8fb0"/><stop offset="1" stop-color="#e35186"/>
            </linearGradient>
          </defs>
          <circle cx="50" cy="53" r="33" stroke="url(#ring-en)" stroke-width="14"
                  stroke-linecap="round" stroke-dasharray="150 58" transform="rotate(-58 50 53)"/>
          <circle cx="79" cy="27" r="11.5" fill="#35aede"/>
        </svg>
        <span class="wordmark">Open<span class="b">Bili</span>Claw</span>
      </div>

      <div class="hero-wrap">
        <h1 class="hero">Your own local recommendation agent.</h1>
        <div class="platforms">
          <span class="plat" style="--c:#fb7299"><i></i>Bilibili</span><span class="sep">·</span>
          <span class="plat" style="--c:#ff2442"><i></i>Xiaohongshu</span><span class="sep">·</span>
          <span class="plat" style="--c:#12b5bd"><i></i>Douyin</span><span class="sep">·</span>
          <span class="plat" style="--c:#e62117"><i></i>YouTube</span>
        </div>
      </div>

      <div class="footer">
        <span class="pill">Local-first</span>
        <span class="pill">Private</span>
        <span class="pill">Open-source</span>
      </div>
    </div>
  </div>

  <!-- ================= 中文 ================= -->
  <div class="card" id="card-zh">
    <div class="topbar"></div>
    <div class="content">
      <div class="brand">
        <svg class="logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="ring-zh" x1="14" y1="20" x2="86" y2="86" gradientUnits="userSpaceOnUse">
              <stop stop-color="#ff8fb0"/><stop offset="1" stop-color="#e35186"/>
            </linearGradient>
          </defs>
          <circle cx="50" cy="53" r="33" stroke="url(#ring-zh)" stroke-width="14"
                  stroke-linecap="round" stroke-dasharray="150 58" transform="rotate(-58 50 53)"/>
          <circle cx="79" cy="27" r="11.5" fill="#35aede"/>
        </svg>
        <span class="wordmark">Open<span class="b">Bili</span>Claw</span>
      </div>

      <div class="hero-wrap">
        <h1 class="hero">夺回推荐主权</h1>
        <div class="sub">本地私有的全网内容发现 Agent</div>
        <div class="platforms">
          <span class="plat" style="--c:#fb7299"><i></i>哔哩哔哩</span><span class="sep">·</span>
          <span class="plat" style="--c:#ff2442"><i></i>小红书</span><span class="sep">·</span>
          <span class="plat" style="--c:#12b5bd"><i></i>抖音</span><span class="sep">·</span>
          <span class="plat" style="--c:#e62117"><i></i>YouTube</span>
        </div>
      </div>

      <div class="footer">
        <span class="pill">本地优先</span>
        <span class="pill">隐私私有</span>
        <span class="pill">开源自托管</span>
      </div>
    </div>
  </div>

</body>
</html>
